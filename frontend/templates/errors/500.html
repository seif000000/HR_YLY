{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem;">
    <div style="position: relative; display: inline-block;">
        <img src="{{ url_for('static', filename='img/mascot.png') }}" alt="Mascot" style="height: 250px; filter: grayscale(0.5) contrast(1.2);">
        <div style="position: absolute; top: -20px; right: -40px; background: white; padding: 10px 20px; border-radius: 20px; border: 2px solid var(--accent-color); box-shadow: var(--shadow);">
            <p style="font-weight: 700; color: var(--accent-color);">😱 هو في إيه اللي حصل</p>
        </div>
    </div>
    <h1 style="font-size: 3rem; margin-top: 2rem; color: var(--accent-color);">500</h1>
    <p style="font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 2rem;" data-i18n="500_msg">حصل مشكلة تقنية بسيطة، فريقنا شغال بيصلحها دلوقتي</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary" style="padding: 1rem 2rem; font-size: 1.1rem; border-radius: 50px;">
        الرجوع للرئيسية
    </a>
</div>
{% endblock %}
