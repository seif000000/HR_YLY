{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem;">
    <div style="position: relative; display: inline-block;">
        <img src="{{ url_for('static', filename='img/mascot.png') }}" alt="Mascot" style="height: 250px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        <div style="position: absolute; top: -20px; right: -40px; background: white; padding: 10px 20px; border-radius: 20px; border: 2px solid var(--primary-color); box-shadow: var(--shadow);">
            <p style="font-weight: 700; color: var(--primary-color);">؟! مممممم فين الصفحة</p>
        </div>
    </div>
    <h1 style="font-size: 3rem; margin-top: 2rem; color: var(--primary-color);">404</h1>
    <p style="font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 2rem;" data-i18n="404_msg">عذراً، الصفحة اللي بتدور عليها مش موجودة حالياً</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary" style="padding: 1rem 2rem; font-size: 1.1rem; border-radius: 50px;">
        الرجوع للرئيسية
    </a>
</div>
{% endblock %}
